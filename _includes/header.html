<header class="site-header">
  <div class="header-inner">
    <a href="{{ '/' | relative_url }}" class="site-name">{{ site.title | escape }}</a>
    <nav class="top-nav">
      <ul>
        {% assign current_url = page.url | downcase %}
        <li class="{% if current_url == '/' or current_url == '/index.html' %}active{% endif %}">
          <a href="{{ '/' | relative_url }}">Content</a>
        </li>
        <li class="{% if page.layout == 'post' or current_url contains 'blog' %}active{% endif %}">
          <a href="{{ '/blog.html' | relative_url }}">Writing</a>
        </li>
        <li class="{% if current_url contains 'about' %}active{% endif %}">
          <a href="{{ '/about.html' | relative_url }}">About</a>
        </li>
        <li class="{% if current_url contains 'contact' %}active{% endif %}">
          <a href="{{ '/contact.html' | relative_url }}">Contact</a>
        </li>
      </ul>
    </nav>
  </div>
</header>
